<template>
    <div class="slds-drop-zone__actions actionButtons" role="toolbar" aria-label={actionsAriaLabel}>
        <lightning-button-group>
            <lightning-button-icon
                onclick={handleMoveUp}
                icon-name="utility:up"
                size="x-small"
                alternative-text={moveUpAltText}
                variant="border-inverse"
                title={moveUpAltText}
            ></lightning-button-icon>
            <lightning-button-icon
                onclick={handleMoveDown}
                icon-name="utility:down"
                size="x-small"
                alternative-text={moveDownAltText}
                variant="border-inverse"
                title={moveDownAltText}
            ></lightning-button-icon>
            <lightning-button-icon
                onclick={handleDuplicate}
                icon-name="utility:copy"
                size="x-small"
                alternative-text={duplicateAltText}
                variant="border-inverse"
                title={duplicateAltText}
            ></lightning-button-icon>
            <lightning-button-icon
                onclick={handleDelete}
                icon-name="utility:close"
                size="x-small"
                alternative-text={deleteAltText}
                variant="border-inverse"
                title={deleteAltText}
            ></lightning-button-icon>
        </lightning-button-group>
    </div>
</template>
