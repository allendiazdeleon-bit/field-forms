<template>
    <template if:true={loading}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
    </template>
    <div class="slds-m-vertical_medium">
        <lightning-button label={buttonLabel} onclick={handleExport} disabled={templatesNotSelected}></lightning-button>
    </div>

    <lightning-datatable
        key-field="Id"
        data={records}
        columns={columns}
        onrowselection={handleRowSelection}
       >
    </lightning-datatable>
    <div>

    </div>
    
</template>
