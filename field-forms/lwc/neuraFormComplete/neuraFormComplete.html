<template>
    <div class={wrapperClasses}>
        <div class="inner-wrapper slds-grid slds-wrap slds-align_absolute-center">
            <div class="slds-text-heading_medium slds-m-bottom_medium slds-align_absolute-center slds-size_1-of-1">Form Complete</div>
            <div class="slds-align_absolute-center slds-size_1-of-1">
                <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                    <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                    <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
            </div>

            <!-- PDF status. Generated server-side via NeuraFormPdfController
                 → NeuraFormReportPDF Visualforce page; attached to the
                 Linked_Form (and parent WO) as a ContentDocument. -->
            <div class="slds-align_absolute-center slds-size_1-of-1 slds-m-top_medium">
                <template if:true={pdfGenerating}>
                    <div class="pdf-status">
                        <lightning-spinner alternative-text="Generating PDF" size="small"></lightning-spinner>
                        <span class="slds-m-left_small">Generating PDF report…</span>
                    </div>
                </template>
                <template if:true={pdfReady}>
                    <a href={pdfDownloadUrl} target="_blank" class="pdf-download-link">
                        <lightning-icon icon-name="utility:download" size="x-small"></lightning-icon>
                        <span class="slds-m-left_x-small">Download PDF report</span>
                    </a>
                </template>
            </div>

            <c-neura-mobile-button class="slds-m-top_large" title="Back to Forms" onbuttonclick={handleBack} variant="success"></c-neura-mobile-button>
        </div>
    </div>
</template>
