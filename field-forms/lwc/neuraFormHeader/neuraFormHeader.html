<template>
    <!-- Form header — clean title + subtitle pattern. Replaces the conic
         progress ring that dominated the top of every form. The thin
         progress bar below the subtitle still surfaces completion at a
         glance, without the heavy chrome. -->
    <header class="form-header">
        <div class="form-header__inner">
            <p class="form-header__eyebrow">
                <span>Page {currentStepIndexDisplay} of {totalSteps}</span>
                <template if:true={isNextStep}>
                    <span class="form-header__eyebrow-sep" aria-hidden="true">&middot;</span>
                    <span class="form-header__eyebrow-next">Next: {nextStep}</span>
                </template>
            </p>
            <h1 class="form-header__title">{currentStep}</h1>
            <div class="form-header__progress" aria-hidden="true">
                <div class="form-header__progress-fill" style={progressStyle}></div>
            </div>
        </div>
    </header>
</template>
