<template>
    <!--have to hardcode to avoid rendering issues -->
    <div class="margin-bottom:50px">
        <template if:true={isForm}>
            <lightning-record-edit-form object-api-name={formTemplateApiName}>
                <lightning-messages></lightning-messages>
                <template for:each={activeSelection} for:item="setting">
                    <lightning-input-field key={setting.label} onchange={handleAttributeChange} field-name={setting.label} value={setting.value}> </lightning-input-field>
                </template>
            </lightning-record-edit-form>
        </template>
        
        <template if:true={isPage}>
            <lightning-record-edit-form object-api-name={formPageApiName}>
                <lightning-messages></lightning-messages>
                <template for:each={activeSelection} for:item="setting">
                    <template if:true={setting.isStandard}>
                        <lightning-input-field key={setting.label} onchange={handleAttributeChange} field-name={setting.label} value={setting.value}> </lightning-input-field>
                    </template>
                    <template if:true={setting.isColor}>
                        <lightning-input key={setting.label} class="slds-form-element_stacked" type="color" label={setting.displayLabel} field-name={setting.label} onchange={handleAttributeChange} value={setting.value}></lightning-input>
                    </template>
                </template>
            </lightning-record-edit-form>
        </template>
        <template if:true={isSection}>
            <lightning-record-edit-form object-api-name={formSectionApiName}>
                <lightning-messages></lightning-messages>
                <template for:each={activeSelection} for:item="setting">
                    <template if:true={setting.isStandard}>
                        <lightning-input-field key={setting.label} onchange={handleAttributeChange} field-name={setting.label} value={setting.value}> </lightning-input-field>
                    </template>
                    <template if:true={setting.isColor}>
                        <lightning-input key={setting.label} class="slds-form-element_stacked" type="color" label={setting.displayLabel} field-name={setting.label} onchange={handleAttributeChange} value={setting.value}></lightning-input>
                    </template>
                </template>
            </lightning-record-edit-form>
        </template>
        <template if:true={isQuestion}>
            <!-- Pillar 2 catalog provenance: shows whether this binding is
                 linked to a catalog entry and whether per-binding overrides
                 are in effect. Action buttons fire requestoverride /
                 revert events that we handle below. -->
            <c-neura-form-catalog-provenance
                selection={selection}
                onrequestoverride={handleRequestOverride}
                onrevert={handleRevert}>
            </c-neura-form-catalog-provenance>
            <lightning-record-edit-form object-api-name={formQuestionApiName}>
                <lightning-messages></lightning-messages>
                <div lwc:if={isNotDisplayText}>
                    <!-- Three render modes for the question text input — see
                         the getters in neuraFormBuilderAttributes.js for the
                         decision matrix. -->
                    <template if:true={showLegacyQuestionInput}>
                        <lightning-input-field onchange={handleAttributeChange} field-name={questionFieldApiName} value={questionFieldValue}> </lightning-input-field>
                    </template>
                    <template if:true={showExclusiveEditableInput}>
                        <!-- Wave 35.8a: exclusive catalog entry (count=1).
                             Input edits Question__c directly; controller
                             syncs to the catalog on save. No Override click
                             required for the common new-question case. -->
                        <lightning-input-field onchange={handleAttributeChange} field-name={questionFieldApiName} value={questionFieldValue}> </lightning-input-field>
                        <!-- Wave 35.9b: SOSL-backed "did you mean..." hint.
                             Surfaces near-duplicate catalog entries the
                             admin might want to use instead of creating
                             one. Hidden when no matches; debounced. -->
                        <c-neura-form-catalog-similar question-text={questionFieldValue}></c-neura-form-catalog-similar>
                    </template>
                    <template if:true={showInheritedQuestionReadOnly}>
                        <div class="slds-form-element slds-form-element_readonly">
                            <span class="slds-form-element__label">Question (inherited from catalog)</span>
                            <div class="slds-form-element__control">
                                <div class="slds-form-element__static slds-text-color_weak">{questionFieldValue}</div>
                            </div>
                        </div>
                    </template>
                    <template if:true={showOverrideQuestionInput}>
                        <lightning-input-field onchange={handleAttributeChange} field-name={overrideQuestionFieldApiName} value={overrideQuestionFieldValue}> </lightning-input-field>
                    </template>
                </div>
                <template for:each={activeSelection} for:item="setting">
                    <template if:true={setting.isStandard}>
                        <lightning-input-field key={setting.label} onchange={handleAttributeChange} field-name={setting.label} value={setting.value}> </lightning-input-field>
                    </template>
                    <template if:true={setting.isColor}>
                        <div key={setting.label} class="slds-form-element slds-form-element_stacked">
                        <lightning-input  type="color" label={setting.displayLabel} field-name={setting.label} onchange={handleAttributeChange} value={setting.value}></lightning-input>
                        </div>
                    </template>
                    <template if:true={setting.isValueSet}>
                        <c-neura-form-builder-attributes-value-set key={setting.label} field-name={setting.label} value-set={setting.value} onupdate={handleValueSetChange}></c-neura-form-builder-attributes-value-set>
                    </template>
                </template>
            </lightning-record-edit-form>
        </template>
        <template lwc:if={isNotForm}>
            <c-neura-form-criteria-builder onupdate={handleConditionsUpdate} selection={selection} condition-field-value={conditionFieldValue}></c-neura-form-criteria-builder>
        </template>
    </div>
</template>
