<template>
    <div class="slds-box slds-box_x-small slds-m-bottom_small slds-theme_shade">
        <div class="slds-grid slds-grid_vertical-align-center slds-gutters_xx-small">
            <div class="slds-col slds-no-flex">
                <lightning-icon
                    icon-name={badgeIcon}
                    size="x-small"
                    variant={badgeVariant}
                    alternative-text={badgePrimaryText}>
                </lightning-icon>
            </div>
            <div class="slds-col">
                <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_none">
                    <strong>{badgePrimaryText}</strong>
                </p>
                <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_none">
                    {badgeSecondaryText}
                </p>
            </div>
            <template if:true={showOverrideButton}>
                <div class="slds-col slds-no-flex">
                    <lightning-button
                        label="Override in this template"
                        variant="brand-outline"
                        icon-name="utility:edit"
                        icon-position="left"
                        onclick={handleRequestOverride}
                        title="Edit the question text for this template only. The catalog default stays unchanged.">
                    </lightning-button>
                </div>
            </template>
            <template if:true={showRevertButton}>
                <div class="slds-col slds-no-flex">
                    <lightning-button
                        label="Revert to catalog default"
                        variant="destructive-text"
                        icon-name="utility:undo"
                        icon-position="left"
                        onclick={handleRevert}
                        title="Discard the per-template override and inherit the catalog default again.">
                    </lightning-button>
                </div>
            </template>
            <template if:true={hasCatalogLink}>
                <div class="slds-col slds-no-flex">
                    <lightning-button
                        label="Open catalog entry"
                        variant="base"
                        icon-name="utility:new_window"
                        icon-position="right"
                        onclick={handleOpenCatalog}
                        title="Open the catalog record in a new tab. Edits there affect every template using this question.">
                    </lightning-button>
                </div>
            </template>
            <template if:true={showCreateCatalogButton}>
                <div class="slds-col slds-no-flex">
                    <lightning-button
                        label="Create catalog entry"
                        variant="brand-outline"
                        icon-name="utility:add"
                        icon-position="left"
                        onclick={handleCreateCatalog}
                        title="Add this question to the catalog so it can be scored and reused across templates.">
                    </lightning-button>
                </div>
            </template>
        </div>
    </div>
</template>
