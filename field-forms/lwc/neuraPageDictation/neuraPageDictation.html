<template>
    <div class={wrapperClass}>
        <template if:true={compact}>
            <lightning-button-icon
                icon-name="utility:unmuted"
                variant="border-filled"
                alternative-text={togglerLabel}
                tooltip="Dictate this page — speak or type once, apply across the page's questions"
                onclick={handleToggle}
            ></lightning-button-icon>
        </template>
        <template if:false={compact}>
            <lightning-button
                label={togglerLabel}
                icon-name="utility:unmuted"
                icon-position="left"
                variant="neutral"
                onclick={handleToggle}
            ></lightning-button>
        </template>

        <template if:true={showPanel}>
            <div class={panelClass}>
                <p class="slds-text-body_small slds-m-bottom_x-small">
                    Speak naturally about this page (use your keyboard's mic key,
                    or type/paste), then tap Apply. Example:
                    <em>"The customer is John Doe. Reason is repair."</em>
                </p>
                <lightning-textarea
                    label="Dictation"
                    variant="label-hidden"
                    placeholder="Type or dictate your notes for this page..."
                    value={transcriptText}
                    onchange={handleTextChange}
                ></lightning-textarea>

                <div class="slds-grid slds-grid_align-spread slds-m-top_x-small">
                    <div class="slds-col">
                        <template if:true={isWebSpeechAvailable}>
                            <c-neura-voice-capture
                                aria-label="Dictate into the textarea"
                                ontranscript={handleVoiceTranscript}
                            ></c-neura-voice-capture>
                        </template>
                    </div>
                    <div class="slds-col slds-no-flex">
                        <lightning-button
                            label="Clear"
                            variant="neutral"
                            class="slds-m-right_x-small"
                            onclick={handleClear}
                            disabled={hasNoText}
                        ></lightning-button>
                        <lightning-button
                            label="Apply"
                            variant="brand"
                            onclick={handleApply}
                            disabled={hasNoText}
                        ></lightning-button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
