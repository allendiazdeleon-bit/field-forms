<template>
	<!-- Review-and-submit screen. Shown when the tech taps Finish; lets
	     them confirm every answer, regenerate / edit an AI summary, and
	     jump back to any page before final submit. -->
	<template if:true={inReview}>
		<c-neura-form-review
			form-object={formObject}
			linked-form-id={linkedFormId}
			onedit={handleReviewEdit}
			onsubmit={handleReviewSubmit}
		></c-neura-form-review>
	</template>

	<template if:true={isLoaded}>
		<div class="renderer-wrapper">
			<div class="temp-test"></div>
			<c-neura-form-header
				class="form-header"
				indicator-type={indicatorType}
				step-list={pageTitleList}
				total-steps={totalPageCount}
				current-step-index={currentPageIndex}
				current-step={currentPageTitle}
				form-score={formScore}
				form-max-score={formMaxScore}
				form-score-threshold={formScoreThreshold}
			></c-neura-form-header>

			<!-- Auto-save status badge. Lets the tech see at a glance that
			     their changes are persisting; "Save failed" alerts to a
			     connectivity issue without breaking page navigation. -->
			<template if:true={autoSaveLabel}>
				<div class={autoSaveBadgeClass}>{autoSaveLabel}</div>
			</template>

			<!-- Page action toolbar. "Same as last visit" prefills from the
			     most recent completed Linked_Form; "Dictate this page" expands
			     a transcript panel. Grouped in a single flex row so they read
			     as one toolbar instead of left-stacked blocks. -->
			<div class="form-toolbar">
				<lightning-button
					label="Same as last visit"
					icon-name="utility:copy"
					icon-position="left"
					variant="brand-outline"
					onclick={handlePrefillLastVisit}
				></lightning-button>
				<c-neura-page-dictation
					ondictate={handlePageDictation}
				></c-neura-page-dictation>
			</div>

			<!-- Real-time coaching card (Vignette 3). Appears inline as the
			     inspector answers, surfacing prior-visit anomalies and a
			     suggested action before they leave the site. -->
			<template if:true={hasCoaching}>
				<div class="coaching-card" role="status">
					<lightning-icon
						icon-name="utility:einstein"
						size="small"
						class="coaching-card__icon"
					></lightning-icon>
					<div class="coaching-card__body">
						<p class="coaching-card__message">{coaching.message}</p>
						<div class="coaching-card__actions">
							<template if:true={coaching.actionLabel}>
								<lightning-button
									label={coaching.actionLabel}
									variant="brand"
									onclick={handleCoachingAction}
								></lightning-button>
							</template>
							<lightning-button
								label="Dismiss"
								variant="base"
								onclick={handleCoachingDismiss}
							></lightning-button>
						</div>
					</div>
				</div>
			</template>

			<div
				class={pageWrapperClass}
				ontouchstart={handlePageSwipeStart}
				ontouchend={handlePageSwipeEnd}
			>
				<c-neura-form-page
					lwc:ref="formPage"
					record-id={recordId}
					form-page={currentPage}
					answer-map={answerMap}
					skipped-ids={_skippedIds}
					onanswerchange={handleAnswerChange}
					onskiptoggle={handleSkipToggle}
				></c-neura-form-page>

				<!-- Skip-and-return queue badge. Only renders when the
				     queue isn't empty so it doesn't clutter the chrome on
				     normal-flow forms. -->
				<template if:true={hasSkipped}>
					<div class="skip-queue-badge">
						<lightning-icon
							icon-name="utility:flag"
							size="x-small"
							class="skip-queue-badge__icon"
						></lightning-icon>
						{skippedBadgeLabel}
					</div>
				</template>
			</div>
			<c-neura-form-footer
				onbuttonclick={handleFooterButtonClick}
				total-pages={totalPageCount}
				current-page-index={currentPageIndex}
			></c-neura-form-footer>

			<!-- Pillar 5 findings panel. Only mounts when scoring is enabled
			     on the template so non-scored forms keep their original
			     chrome. The panel manages its own expanded state via the
			     swipe handle. -->
			<template if:true={showFindingsPanel}>
				<c-neura-form-findings-panel
					class="renderer-findings-panel"
					findings={findings}
					onfindingclick={handleFindingClick}
					onaddphoto={handleFindingAddPhoto}
					onmarkexception={handleFindingMarkException}
				></c-neura-form-findings-panel>
			</template>
		</div>
	</template>
	<template if:true={isCompleted}>
		<c-neura-form-complete
			is-desktop={isDesktop}
			pdf-generating={pdfGenerating}
			pdf-ready={pdfReady}
			pdf-download-url={pdfDownloadUrl}
		></c-neura-form-complete>
	</template>
</template>
