<template>
    <template if:true={loading}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
    </template>
    <lightning-card title="Import Form Templates" icon-name="custom:custom63">
        <div class="slds-m-around_medium">
            <lightning-input type="file"
                             label="Upload JSON File"
                             accept=".json"
                             onchange={handleFileChange}
                             class="slds-m-bottom_medium">
            </lightning-input>

            <lightning-button
                variant="base"
                label="Download sample JSON"
                icon-name="utility:download"
                onclick={handleDownloadSample}
                class="slds-m-bottom_small">
            </lightning-button>

            <template if:true={fileName}>
                <div class="slds-m-top_small">
                    <p><strong>File selected:</strong> {fileName}</p>
                    <p class="slds-text-body_small slds-text-color_weak">
                        Contains {parsedTemplateCount} template(s).
                    </p>
                </div>

                <lightning-input
                    type="checkbox"
                    label="Import as new (create copies instead of updating existing templates)"
                    checked={importAsNew}
                    onchange={handleImportAsNewChange}
                    class="slds-m-top_small">
                </lightning-input>

                <div class="slds-m-top_medium">
                    <lightning-button
                        variant="neutral"
                        label="Preview"
                        icon-name="utility:preview"
                        onclick={handlePreview}
                        disabled={previewing}
                        class="slds-m-right_x-small">
                    </lightning-button>
                    <lightning-button variant="brand"
                                    label={importButtonLabel}
                                    title="Import"
                                    onclick={importData}>
                    </lightning-button>
                </div>
            </template>

            <!-- Preview / dry-run summary panel -->
            <template if:true={showPreview}>
                <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="nf-import-preview" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <h2 id="nf-import-preview" class="slds-text-heading_medium">Preview Import</h2>
                            <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={handleClosePreview}>
                                <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                            </button>
                        </header>
                        <div class="slds-modal__content slds-p-around_medium">
                            <p class="slds-text-title slds-m-bottom_small">
                                {preview.templateCount} template(s) &bull;
                                {preview.pageCount} page(s) &bull;
                                {preview.sectionCount} section(s) &bull;
                                {preview.questionCount} question(s)
                            </p>
                            <p class="slds-text-body_regular slds-m-bottom_medium">
                                Will create <strong>{preview.toCreateCount}</strong> new template(s) and update <strong>{preview.toUpdateCount}</strong> existing one(s).
                            </p>

                            <template if:true={hasPreviewCollisions}>
                                <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-bottom_medium" role="alert">
                                    <h3 class="slds-text-heading_small">Name collisions</h3>
                                    <ul class="slds-list_dotted slds-m-top_x-small">
                                        <template for:each={previewCollisionItems} for:item="item">
                                            <li key={item.id}>{item.text}</li>
                                        </template>
                                    </ul>
                                </div>
                            </template>

                            <template if:true={hasPreviewWarnings}>
                                <div class="slds-notify slds-notify_alert slds-alert_warning" role="alert">
                                    <h3 class="slds-text-heading_small">Condition warnings</h3>
                                    <ul class="slds-list_dotted slds-m-top_x-small">
                                        <template for:each={previewWarningItems} for:item="item">
                                            <li key={item.id}>{item.text}</li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                        </div>
                        <footer class="slds-modal__footer">
                            <lightning-button label="Close" onclick={handleClosePreview}></lightning-button>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>

            <!-- Post-import summary -->
            <template if:true={importedTemplates}>
                <div class="slds-m-top_medium">
                    <p class="slds-text-title slds-m-bottom_x-small">{countSummary}</p>

                    <template if:true={hasWarnings}>
                        <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-bottom_small" role="alert">
                            <h2 class="slds-text-heading_small">Import warnings:</h2>
                            <ul class="slds-list_dotted slds-m-top_x-small">
                                <template for:each={importWarningItems} for:item="item">
                                    <li key={item.id}>{item.text}</li>
                                </template>
                            </ul>
                        </div>
                    </template>

                    <lightning-card title="Imported Templates">
                        <lightning-datatable key-field="Id"
                                            data={importedTemplates}
                                            columns={columns}
                                            hide-checkbox-column="true"
                                            class="slds-m-top_medium">
                        </lightning-datatable>
                    </lightning-card>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
