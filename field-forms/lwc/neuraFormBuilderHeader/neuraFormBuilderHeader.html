<template>
    <div class="slds-builder-header_container" style="position: relative">
        <header class="slds-builder-header">
            <div class="slds-builder-header__item">
                <div class="slds-builder-header__item-action" title="Back" data-action="back" onclick={handleClick}>
                    <span class="slds-icon_container slds-icon-utility-back slds-current-color">
                        <lightning-icon icon-name="utility:back" size="x-small" alternative-text="Back"></lightning-icon>
                        <span class="slds-assistive-text">Back</span>
                    </span>
                </div>
            </div>
            <div class="slds-builder-header__item">
                <div class="slds-builder-header__item-label slds-media slds-media_center">
                    <div class="slds-media__figure"><span
                            class="slds-icon_container slds-icon-utility-builder slds-current-color">
                        <lightning-icon icon-name="utility:builder" size="x-small" alternative-text="Builder"></lightning-icon>
                        </span></div>
                    <div class="slds-media__body">{builderName}</div>
                </div>
            </div>
            <!-- "Forms" indicator. The dropdown affordance was previously
                 clickable but had no handler; the onclick has been removed so
                 it no longer fires a no-op event. Kept visually as a label. -->
            <nav class="slds-builder-header__item slds-builder-header__nav" aria-label="Current form">
                <ul class="slds-builder-header__nav-list">
                    <li class="slds-builder-header__nav-item">
                        <div class="slds-builder-header__item-action slds-media slds-media_center">
                            <span class="slds-media__figure">
                                <span class="slds-icon_container slds-icon-utility-page slds-current-color">
                                    <lightning-icon icon-name="utility:page" size="x-small" alternative-text="Form"></lightning-icon>
                                </span>
                            </span>
                            <span class="slds-media__body">
                                <span class="slds-truncate" title={dropdownTitle}>{dropdownTitle}</span>
                            </span>
                        </div>
                    </li>
                </ul>
            </nav>
            <div class="slds-builder-header__item slds-has-flexi-truncate">
                <h1 class="slds-builder-header__item-label">
                    <span class="slds-truncate" title={title}>{title}</span>
                </h1>
            </div>
            <!-- Settings and Help utility items were rendered but had no
                 handlers; clicking them did nothing. Removed to avoid
                 misleading the user. Reintroduce if real handlers ship. -->
            <div class="slds-builder-header__item slds-builder-header__utilities"></div>
        </header>
        <div class="slds-builder-toolbar" role="toolbar">
            <div class="slds-builder-toolbar__item-group" aria-label="Canvas Actions">
                <lightning-button-group>
                    <lightning-button-icon title="Undo" disabled={disableUndo} icon-name="utility:undo" variant="border" alternative-text="Undo" data-action="undo" onclick={handleClick}></lightning-button-icon>
                    <lightning-button-icon title="Redo" disabled={disableRedo} icon-name="utility:redo" variant="border" alternative-text="Redo" data-action="redo" onclick={handleClick}></lightning-button-icon>
                </lightning-button-group>
            </div>
            <div class="slds-builder-toolbar__item-group" aria-label="Edit actions">
                <!-- Cut was never wired to a handler in the builder. Copy/paste are. -->
                <lightning-button-group>
                    <lightning-button-icon title="Copy" icon-name="utility:copy" variant="border" alternative-text="Copy" data-action="copy" disabled={disableCopy} onclick={handleClick}></lightning-button-icon>
                    <lightning-button-icon title="Paste" icon-name="utility:paste" variant="border" alternative-text="Paste" data-action="paste" disabled={disablePaste} onclick={handleClick}></lightning-button-icon>
                </lightning-button-group>
                <lightning-button-icon title="Toggle component panel" icon-name="utility:toggle_panel_left" variant="border" alternative-text="Toggle component panel" data-action="toggle" class="slds-m-left_x-small" onclick={handleClick}></lightning-button-icon>
            </div>
            <div class="slds-builder-toolbar__item-group middle-actions" aria-label="Display Actions">
                <lightning-combobox 
                    name="screenSize"
                    label="Screen Size"
                    value={screenSizeDefault}
                    placeholder="Select Screen Size"
                    options={screenSizeOptions}
                    data-action="screensize"
                    variant="label-hidden"
                    onchange={handleClick}>
                </lightning-combobox>
            </div>
            <div class="slds-builder-toolbar__actions" aria-label="Document actions">
                    <template if:true={showAIButton}>
                        <lightning-button
                            label="Generate with AI"
                            icon-name="utility:einstein"
                            variant="neutral"
                            onclick={handleAIGenerate}
                            class="slds-m-right_x-small"
                        ></lightning-button>
                    </template>
                    <lightning-button label="Save As" data-action="saveas" onclick={handleClick} variant="neutral"></lightning-button>
                    <lightning-button label="Save" data-action="save" onclick={handleClick} variant="brand" class="slds-m-left_x-small"></lightning-button>
            </div>
        </div>
    </div>
</template>
