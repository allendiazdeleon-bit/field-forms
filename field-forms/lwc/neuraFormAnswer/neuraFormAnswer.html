<template>
	<div
		class="slds-grid slds-wrap slds-gutters slds-m-bottom_small"
	>
		<div class={columnSizingClass}>
			<!-- Native lightning-input shape — replaces 10 per-type branches
			     (Text / Date / Time / Number / Email / Phone / Toggle /
			     Checkbox / Date Time / Currency). The active type's HTML
			     `type` attribute + data-id + optional formatter/step/
			     placeholder all come from typeRegistry.js via the
			     nativeInput* getters. Adding a new lightning-input-flavored
			     type is now one row in the registry, no template change. -->
			<template if:true={useNativeInput}>
				<div class="slds-grid slds-grid_vertical-align-center">
					<div class="slds-col slds-grow">
						<lightning-input
							data-id={nativeInputDataId}
							type={nativeInputType}
							formatter={nativeInputFormatter}
							step={nativeInputStep}
							placeholder={nativeInputPlaceholder}
							label={nativeInputDataId}
							value={value}
							checked={value}
							message-toggle-active={toggleActiveMessage}
							message-toggle-inactive={toggleInactiveMessage}
							variant="label-hidden"
							onchange={handleChange}
						></lightning-input>
					</div>
					<!-- Per-question mic: dictate straight into THIS answer
					     (appends via handleVoiceTranscript). Hides itself on
					     platforms without Web Speech — there, the keyboard's
					     own mic key fills the focused input instead. -->
					<template if:true={isTextBox}>
						<div class="slds-col slds-grow-none slds-m-left_xx-small">
							<c-neura-voice-capture
								aria-label="Dictate this answer"
								ontranscript={handleVoiceTranscript}
							></c-neura-voice-capture>
						</div>
					</template>
				</div>
			</template>

			<template
				if:true={isTextArea}
			>
				<div class="slds-grid slds-grid_vertical-align-start">
					<div class="slds-col slds-grow">
						<lightning-textarea
							data-id="textArea"
							label="Text Area"
							value={value}
							variant="label-hidden"
							onchange={handleChange}
						></lightning-textarea>
					</div>
					<div class="slds-col slds-grow-none slds-m-left_xx-small">
						<c-neura-voice-capture
							aria-label="Dictate this answer"
							ontranscript={handleVoiceTranscript}
						></c-neura-voice-capture>
					</div>
				</div>
			</template>

			<!-- Multiple Choice — pills for ≤6 options, multi-select combobox above.
			     The threshold is enforced in the JS via useChoicePills getter. -->
			<template if:true={useMultipleChoicePills}>
				<c-neura-form-answer-input-choice-pills
					data-id="multipleChoice"
					options={options}
					val={value}
					is-multi
					onchange={handleChange}
				></c-neura-form-answer-input-choice-pills>
			</template>
			<template if:true={useMultipleChoiceCombobox}>
				<c-neura-form-answer-input-multi-select
					data-id="multipleChoice"
					options={options}
					selected-values={value}
					onchange={handleChange}
				></c-neura-form-answer-input-multi-select>
			</template>

			<!-- Single Checkbox (one-box) is now handled by the
			     useNativeInput shape block above. Multi-checkbox
			     (Checkboxes, plural) renders an iteration below. -->
			<template
				if:true={isCheckboxes}
			>
				<template
					for:each={options}
					for:item="option"
				>
					<lightning-input
						type="checkbox"
						label={option.label}
						key={option.value}
						checked={option.checked}
						variant="label-hidden"
						onchange={handleChange}
					></lightning-input>
				</template>
			</template>

			<template if:true={isSlider}>
				<lightning-slider
					data-id="slider"
					label="Slider"
					value={value}
					size={sliderSize}
					step={sliderStep}
					max={max}
					min={min}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-slider>
			</template>

			<!-- Dropdown — pills for ≤6 options, combobox above. -->
			<template if:true={useDropDownPills}>
				<c-neura-form-answer-input-choice-pills
					data-id="dropDown"
					options={options}
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-choice-pills>
			</template>
			<template if:true={useDropDownCombobox}>
				<lightning-combobox
					data-id="dropDown"
					name={uniqueName}
					label="Dropdown Menu"
					options={options}
					value={value}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-combobox>
			</template>

			<!-- Radio Buttons — always pills now. The legacy segmented
			     slider control (c-neura-form-answer-input-radio-buttons)
			     is preserved in the codebase for any direct callers but
			     no longer the default rendering. Pills wrap on narrow
			     screens which handles bigger option counts naturally. -->
			<template if:true={useRadioButtonsPills}>
				<c-neura-form-answer-input-choice-pills
					data-id="radioButtons"
					options={options}
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-choice-pills>
			</template>

			<!-- Date Picker is now handled by the useNativeInput shape above. -->

			<!-- Rating -->
			<template if:true={isRating}>
				<!--<c-neura-form-answer-input-ratings options={radioOptions}></c-neura-form-answer-input-ratings>-->
				<c-neura-form-answer-input-star-rating
					options={radioOptions}
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-star-rating>
			</template>

			<template
				if:true={isScanBarcode}
			>
				<c-neura-form-answer-input-scan-barcode
					onchange={handleChange}
				></c-neura-form-answer-input-scan-barcode>
			</template>

			<!-- Time / Number / Email / Phone are now handled by the
			     useNativeInput shape above. -->

			<!-- Geolocation Field -->
			<template
				if:true={isGeolocation}
			>
				<c-neura-form-answer-input-geolocation
					data-id="geolocation"
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-geolocation>
			</template>

			<!-- Toggle is now handled by the useNativeInput shape above
			     (the shape block passes message-toggle-active /
			     message-toggle-inactive which lightning-input ignores
			     for non-toggle types). -->

			<template
				if:true={isFileUpload}
			>
				<c-neura-form-answer-input-file-upload
					files-data={existingFilesData}
					onaddimages={handleAddImages}
				></c-neura-form-answer-input-file-upload>
			</template>

			<!-- Signature -->
			<template
				if:true={isSignature}
			>
				<c-neura-form-answer-input-signature
					files-data={existingFilesData}
					ondonesignature={handleAddImages}
				></c-neura-form-answer-input-signature>
			</template>

			<!-- Calculation -->
			<template if:true={isCalculation}>
				<c-neura-form-answer-input-calculation
					data-id="calculation"
					formula={calculationFormula}
					format={calculationResultFormat}
					question-id={questionId}
					answer-map={answerMap}
					onchange={handleChange}
				></c-neura-form-answer-input-calculation>
			</template>

			<!-- Pass / Fail / N-A -->
			<template if:true={isPassFailNa}>
				<c-neura-form-answer-input-pass-fail-na
					data-id="passFailNa"
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-pass-fail-na>
			</template>

			<!-- Counter (−/value/+) -->
			<template if:true={isCounter}>
				<c-neura-form-answer-input-counter
					data-id="counter"
					val={value}
					min={min}
					max={max}
					step={numberStep}
					onchange={handleChange}
				></c-neura-form-answer-input-counter>
			</template>

			<!-- Date Time + Currency are now handled by the useNativeInput
			     shape above. Currency's formatter / step / $0.00
			     placeholder are baked into typeRegistry.js. -->

			<!-- Lookup — pick a Salesforce record from the host's related list -->
			<template if:true={isLookup}>
				<c-neura-form-answer-input-lookup
					data-id="lookup"
					parent-record-id={recordId}
					related-list-api-name={lookupRelatedList}
					child-object-api-name={lookupChildObject}
					display-field={lookupDisplayField}
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-lookup>
			</template>

			<!-- Repeatable — variable-length list of text rows
			     (stored as a JSON-stringified array in Answer__c) -->
			<template if:true={isRepeatable}>
				<c-neura-form-answer-input-repeatable
					data-id="repeatable"
					val={value}
					min={min}
					max={max}
					onchange={handleChange}
				></c-neura-form-answer-input-repeatable>
			</template>

			<!-- Checklist — admin-defined rows scored Pass / Fail / N-A.
			     Rows come from Value_Set__c via the existing `options`
			     getter; answer stores as JSON [{label, state}, ...]. -->
			<template if:true={isChecklist}>
				<c-neura-form-answer-input-checklist
					data-id="checklist"
					val={value}
					options={options}
					onchange={handleChange}
				></c-neura-form-answer-input-checklist>
			</template>

			<div
				if:true={showInlineErrorMessage}
				class="slds-form-element slds-has-error"
			>
				<div
					class="slds-form-element__help"
				>
					Complete this field.
				</div>
			</div>
		</div>

		<!-- OPTIONAL ADDITONAL FIELDS TO MOST ANSWERS -->
		<div
			if:true={isIncludePhoto}
			class={columnSizingClass}
		>
			<c-neura-form-answer-input-file-upload
				files-data={existingFilesData}
				layout-style="small"
				onaddimages={handleAddImages}
			></c-neura-form-answer-input-file-upload>
		</div>

		<div
			if:true={isIncludeComment}
			class={lastColSizingClass}
		>
			<label
				class="slds-form-element__label"
				for="text-input-id-1"
			>
				Comment
			</label>
			<lightning-textarea
				data-id="commentTextArea"
				variant="label-hidden"
				value={commentValue}
				onchange={handleCommentChange}
			></lightning-textarea>
		</div>
	</div>
</template>
