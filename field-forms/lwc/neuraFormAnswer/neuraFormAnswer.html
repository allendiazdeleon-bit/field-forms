<template>
	<div
		class="slds-grid slds-wrap slds-gutters slds-m-bottom_small"
	>
		<div class={columnSizingClass}>
			<template
				if:true={isTextBox}
			>
				<div class="slds-grid slds-grid_vertical-align-center">
					<div class="slds-col slds-grow">
						<lightning-input
							data-id="textBox"
							type="text"
							label="Text Box"
							value={value}
							variant="label-hidden"
							onchange={handleChange}
						></lightning-input>
					</div>
				</div>
			</template>

			<template
				if:true={isTextArea}
			>
				<div class="slds-grid slds-grid_vertical-align-start">
					<div class="slds-col slds-grow">
						<lightning-textarea
							data-id="textArea"
							label="Text Area"
							value={value}
							variant="label-hidden"
							onchange={handleChange}
						></lightning-textarea>
					</div>
				</div>
			</template>

			<!-- Multiple Choice — pills for ≤6 options, multi-select combobox above.
			     The threshold is enforced in the JS via useChoicePills getter. -->
			<template if:true={useMultipleChoicePills}>
				<c-neura-form-answer-input-choice-pills
					data-id="multipleChoice"
					options={options}
					val={value}
					is-multi
					onchange={handleChange}
				></c-neura-form-answer-input-choice-pills>
			</template>
			<template if:true={useMultipleChoiceCombobox}>
				<c-neura-form-answer-input-multi-select
					data-id="multipleChoice"
					options={options}
					selected-values={value}
					onchange={handleChange}
				></c-neura-form-answer-input-multi-select>
			</template>

			<!-- Checkboxes -->
			<!-- Assuming checkboxes are passed as an array of { label, value, checked } -->
			<template
				if:true={isCheckbox}
			>
				<lightning-input
					data-id="checkboxButton"
					type="checkbox-button"
					label="check-box"
					name="input1"
					checked={value}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-input>
			</template>

			<template
				if:true={isCheckboxes}
			>
				<template
					for:each={options}
					for:item="option"
				>
					<lightning-input
						type="checkbox"
						label={option.label}
						key={option.value}
						checked={option.checked}
						variant="label-hidden"
						onchange={handleChange}
					></lightning-input>
				</template>
			</template>

			<template if:true={isSlider}>
				<lightning-slider
					data-id="slider"
					label="Slider"
					value={value}
					size={sliderSize}
					step={sliderStep}
					max={max}
					min={min}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-slider>
			</template>

			<!-- Dropdown — pills for ≤6 options, combobox above. -->
			<template if:true={useDropDownPills}>
				<c-neura-form-answer-input-choice-pills
					data-id="dropDown"
					options={options}
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-choice-pills>
			</template>
			<template if:true={useDropDownCombobox}>
				<lightning-combobox
					data-id="dropDown"
					name={uniqueName}
					label="Dropdown Menu"
					options={options}
					value={value}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-combobox>
			</template>

			<!-- Radio Buttons — always pills now. The legacy segmented
			     slider control (c-neura-form-answer-input-radio-buttons)
			     is preserved in the codebase for any direct callers but
			     no longer the default rendering. Pills wrap on narrow
			     screens which handles bigger option counts naturally. -->
			<template if:true={useRadioButtonsPills}>
				<c-neura-form-answer-input-choice-pills
					data-id="radioButtons"
					options={options}
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-choice-pills>
			</template>

			<!-- Date Picker -->
			<template
				if:true={isDatePicker}
			>
				<lightning-input
					data-id="datePicker"
					type="date"
					label="Date Picker"
					value={value}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-input>
			</template>

			<!-- Rating -->
			<template if:true={isRating}>
				<!--<c-neura-form-answer-input-ratings options={radioOptions}></c-neura-form-answer-input-ratings>-->
				<c-neura-form-answer-input-star-rating
					options={radioOptions}
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-star-rating>
			</template>

			<template
				if:true={isScanBarcode}
			>
				<c-neura-form-answer-input-scan-barcode
					onchange={handleChange}
				></c-neura-form-answer-input-scan-barcode>
			</template>

			<!-- Time Picker -->
			<template
				if:true={isTimePicker}
			>
				<lightning-input
					data-id="timePicker"
					type="time"
					label="Time Picker"
					value={value}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-input>
			</template>

			<!-- Number Input -->
			<template
				if:true={isNumberInput}
			>
				<lightning-input
					data-id="numberInput"
					type="number"
					label="Number Input"
					value={value}
					step={numberStep}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-input>
			</template>

			<!-- Email Address Field -->
			<template if:true={isEmail}>
				<lightning-input
					data-id="emailInput"
					type="email"
					label="Email Address"
					value={value}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-input>
			</template>

			<!-- Phone Number Field -->
			<template if:true={isPhone}>
				<lightning-input
					data-id="phoneInput"
					type="tel"
					label="Phone Number"
					value={value}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-input>
			</template>
			<!-- Geolocation Field -->
			<template
				if:true={isGeolocation}
			>
				<c-neura-form-answer-input-geolocation
					data-id="geolocation"
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-geolocation>
			</template>

			<!-- Toggle Field -->
			<template if:true={isToggle}>
				<lightning-input
					data-id="toggle"
					type="toggle"
					name="input1"
					checked={value}
					message-toggle-active={toggleActiveMessage}
					message-toggle-inactive={toggleInactiveMessage}
					onchange={handleChange}
				></lightning-input>
			</template>

			<template
				if:true={isFileUpload}
			>
				<c-neura-form-answer-input-file-upload
					files-data={existingFilesData}
					onaddimages={handleAddImages}
				></c-neura-form-answer-input-file-upload>
			</template>

			<!-- Signature -->
			<template
				if:true={isSignature}
			>
				<c-neura-form-answer-input-signature
					files-data={existingFilesData}
					ondonesignature={handleAddImages}
				></c-neura-form-answer-input-signature>
			</template>

			<!-- Calculation -->
			<template if:true={isCalculation}>
				<c-neura-form-answer-input-calculation
					data-id="calculation"
					formula={calculationFormula}
					format={calculationResultFormat}
					question-id={questionId}
					answer-map={answerMap}
					onchange={handleChange}
				></c-neura-form-answer-input-calculation>
			</template>

			<!-- Pass / Fail / N-A -->
			<template if:true={isPassFailNa}>
				<c-neura-form-answer-input-pass-fail-na
					data-id="passFailNa"
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-pass-fail-na>
			</template>

			<!-- Counter (−/value/+) -->
			<template if:true={isCounter}>
				<c-neura-form-answer-input-counter
					data-id="counter"
					val={value}
					min={min}
					max={max}
					step={numberStep}
					onchange={handleChange}
				></c-neura-form-answer-input-counter>
			</template>

			<!-- Date + Time combined -->
			<template if:true={isDateTime}>
				<lightning-input
					data-id="dateTimeInput"
					type="datetime"
					label="Date Time"
					value={value}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-input>
			</template>

			<!-- Currency (formatted Number) — placeholder shows the locale's
			     currency formatting at empty state so the intent is obvious
			     at design time (lightning-input only renders the formatter
			     on blur with a value). -->
			<template if:true={isCurrency}>
				<lightning-input
					data-id="currencyInput"
					type="number"
					formatter="currency"
					step="0.01"
					label="Currency"
					placeholder="$0.00"
					value={value}
					variant="label-hidden"
					onchange={handleChange}
				></lightning-input>
			</template>

			<!-- Lookup — pick a Salesforce record from the host's related list -->
			<template if:true={isLookup}>
				<c-neura-form-answer-input-lookup
					data-id="lookup"
					parent-record-id={recordId}
					related-list-api-name={lookupRelatedList}
					child-object-api-name={lookupChildObject}
					display-field={lookupDisplayField}
					val={value}
					onchange={handleChange}
				></c-neura-form-answer-input-lookup>
			</template>

			<!-- Repeatable — variable-length list of text rows
			     (stored as a JSON-stringified array in Answer__c) -->
			<template if:true={isRepeatable}>
				<c-neura-form-answer-input-repeatable
					data-id="repeatable"
					val={value}
					min={min}
					max={max}
					onchange={handleChange}
				></c-neura-form-answer-input-repeatable>
			</template>

			<!-- Checklist — admin-defined rows scored Pass / Fail / N-A.
			     Rows come from Value_Set__c via the existing `options`
			     getter; answer stores as JSON [{label, state}, ...]. -->
			<template if:true={isChecklist}>
				<c-neura-form-answer-input-checklist
					data-id="checklist"
					val={value}
					options={options}
					onchange={handleChange}
				></c-neura-form-answer-input-checklist>
			</template>

			<div
				if:true={showInlineErrorMessage}
				class="slds-form-element slds-has-error"
			>
				<div
					class="slds-form-element__help"
				>
					Complete this field.
				</div>
			</div>
		</div>

		<!-- OPTIONAL ADDITONAL FIELDS TO MOST ANSWERS -->
		<div
			if:true={isIncludePhoto}
			class={columnSizingClass}
		>
			<c-neura-form-answer-input-file-upload
				files-data={existingFilesData}
				layout-style="small"
				onaddimages={handleAddImages}
			></c-neura-form-answer-input-file-upload>
		</div>

		<div
			if:true={isIncludeComment}
			class={lastColSizingClass}
		>
			<label
				class="slds-form-element__label"
				for="text-input-id-1"
			>
				Comment
			</label>
			<lightning-textarea
				data-id="commentTextArea"
				variant="label-hidden"
				value={commentValue}
				onchange={handleCommentChange}
			></lightning-textarea>
		</div>
	</div>
</template>
