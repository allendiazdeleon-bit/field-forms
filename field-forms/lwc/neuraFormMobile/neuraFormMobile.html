<template>
    <!-- Mobile shell utility bar: theme toggle on the left, draft-queue
         sync indicator on the right. Visible regardless of which screen
         (selector / renderer / complete) is currently shown. Surfaces
         draft-queue state rather than online/offline (no online/offline
         signal is exposed by FSL Mobile by design). -->
    <div class="slds-p-around_x-small slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
        <c-neura-theme-toggle
            compact
            onthemechange={handleThemeChange}
        ></c-neura-theme-toggle>
        <c-neura-draft-queue-badge
            pending-count={draftBadgePendingCount}
            has-error={draftBadgeHasError}
            last-synced-at={draftBadgeLastSyncedAt}
        ></c-neura-draft-queue-badge>
    </div>

    <!-- Skeleton placeholder instead of a full-page spinner so the user
         sees the shape of the form-picker emerging while data primes.
         Falls back to the spinner pattern only when explicitly requested
         by callers via the legacy isLoading flag — keeps the existing
         behavior contract intact. -->
    <div if:true={isLoading} class="slds-m-vertical_medium">
        <c-neura-skeleton variant="list" count="4"></c-neura-skeleton>
    </div>

    <div if:true={loadAnswerFiles}>
        <c-neura-form-files-data 
            answer-ids={answersId} 
            should-do-refresh-graph-ql={shouldDoRefreshGraphQl} 
            onload={handleFilesLoad}
            onerror={handleFileDataErrors}
        ></c-neura-form-files-data>
    </div>

    <!-- Inline message is shown ABOVE the form (not in place of it) so users
         can see what failed and still interact with the underlying fields.
         Previously this used lwc:if/lwc:else which unmounted the renderer the
         moment a validation toast fired — leaving users stuck with no way to
         get back to the questions. -->
    <div if:true={showInlineMessage}>
        <c-neura-inline-message
            message={messageObj.message}
            variant={messageObj.variant}
            closable={messageObj.isClosable}
        ></c-neura-inline-message>
    </div>

    <div>
        <template if:true={showSelector}>
            <div class="slds-m-vertical_medium">
                <c-neura-form-selector form-options={formOptions} onformselected={handleFormSelected}></c-neura-form-selector>
            </div>

            <!-- B4: when the host record has no Linked_Forms yet (typically
                 because it was created offline and the server-side flow
                 hasn't fired), let the field tech start one from any
                 Default_Form mapped to the host's WorkType. -->
            <template if:true={shouldOfferDraftFallback}>
                <c-neura-empty-state
                    icon-name="utility:new"
                    heading="No forms found for this record yet"
                    body="Start one offline; it will sync when this record syncs."
                >
                    <template for:each={availableDefaultForms} for:item="def">
                        <lightning-button
                            key={def.formTemplateId}
                            class="slds-m-right_x-small slds-m-bottom_x-small"
                            label={def.formTemplateName}
                            variant="brand"
                            data-template-id={def.formTemplateId}
                            onclick={handleCreateDraftForm}
                        ></lightning-button>
                    </template>
                </c-neura-empty-state>
            </template>
        </template>


        <template if:true={showForm}>
            <c-neura-form-renderer
                record-id={recordId}
                form-object={selectedForm}
                host-record-id={recordId}
                host-object-api-name={hostObjectApiName}
                onreturnhome={handleReturnToHome}
                onfooterclick={handleFooterClick}
                oncapturelocation={handleCaptureGeolocation}
                onupdatelinkedformdetails={handleUpdateLinkedFormDetails}
                onupdateformdata={handleUpdateFormData}
                ondraftstate={handleDraftState}
                is-desktop={isDesktop}
                onerror={handleFormRendererError}
                onmessage={handleFormRendererMessage}
                onfindingclick={handleFindingClick}
                onfindingaddphoto={handleFindingAddPhoto}
                onfindingmarkexception={handleFindingMarkException}
            >
            </c-neura-form-renderer>

            <!-- Pillar 5 exception modal. Mounted at the form level so it
                 sits above the renderer's swipe handlers / sticky bars. -->
            <c-neura-form-exception-modal
                open={exceptionModalOpen}
                finding-id={exceptionModalFindingId}
                finding-name={exceptionModalFindingName}
                finding-severity={exceptionModalFindingSeverity}
                exception-policy={exceptionModalPolicy}
                onconfirm={handleExceptionConfirm}
                oncancel={handleExceptionCancel}
            ></c-neura-form-exception-modal>
        </template>
    </div>
</template>
