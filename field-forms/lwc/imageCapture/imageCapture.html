<template>
	<div
		class="slds-grid slds-grid_vertical"
		style="
			background-color: white;
			height: 100%;
		"
	>
		<!--
     <lightning-input type="text" data-id ='customfiles' label="Bulk File Name"></lightning-input>
   -->
		<c-image-selector
			if:false={isImageSelected}
			all-images-data={allImagesData}
			existing-images-data={existingImagesData}
			layout-style={layoutStyle}
			onselectimages={handleImagesSelected}
			oncancelupload={handleCancelUpload}
			ondelete={handleDeleteImage}
			onannotateimage={handleAnnotateImage}
			onuploadrequest={handleUploadRequested}
			onupdatefilename={handleFileNameUpdate}
			style="height: 100%"
		></c-image-selector>
		<c-image-annotate
			if:true={isImageSelected}
			image-info={selectedImageInfo}
			onsave={handleSaveAnnotatedImage}
			ondiscard={handleImageDiscarded}
			ondelete={handleDeleteImage}
			style="height: 100%"
		></c-image-annotate>
	</div>

	<div style="position: relative">
		<c-toast-message
			if:true={shouldShowToast}
			message={toastMessage}
			type={toastType}
			onclose={hideToast}
		></c-toast-message>
	</div>

	<c-loading-spinner
		if:true={isUploading}
		loading-message="Uploading..."
	></c-loading-spinner>
	<c-loading-spinner
		if:true={isReading}
		loading-message=""
	></c-loading-spinner>
</template>
