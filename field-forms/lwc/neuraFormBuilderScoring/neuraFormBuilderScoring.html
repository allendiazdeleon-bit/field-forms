<template>
    <section class="builder-scoring">
        <header class="builder-scoring__header">
            <h3 class="builder-scoring__title">Scoring</h3>
            <template if:true={hasCatalog}>
                <p class="builder-scoring__hint">{blastRadiusLine}</p>
            </template>
        </header>

        <template if:false={hasCatalog}>
            <p class="builder-scoring__no-catalog" role="status">
                This question isn't linked to a catalog entry yet. Use
                "Override" or "Create catalog entry" above to enable
                scoring.
            </p>
        </template>

        <template if:true={hasCatalog}>
            <lightning-record-edit-form
                object-api-name={catalogApiName}
                record-id={catalogId}
                onsubmit={handleSubmit}
                onsuccess={handleSuccess}>
                <lightning-messages></lightning-messages>

                <lightning-input-field field-name="Weight__c"></lightning-input-field>

                <h4 class="builder-scoring__subheading">Pass criteria</h4>

                <!-- Quick rules: one tap writes the criteria JSON for the
                     common single-question cases. Hand-authoring the JSON
                     was the most tedious step of scoring setup. -->
                <div class="builder-scoring__presets">
                    <template if:true={isPassFailNa}>
                        <lightning-button label="Pass when Pass" variant="neutral" onclick={handlePresetPass}></lightning-button>
                        <lightning-button label="Pass unless Fail" variant="neutral" onclick={handlePresetNotFail}
                            title="N/A keeps the points; only an explicit Fail loses them."></lightning-button>
                    </template>
                    <template if:true={isBooleanType}>
                        <lightning-button label="Pass when checked / on" variant="neutral" onclick={handlePresetChecked}></lightning-button>
                    </template>
                    <template if:true={hasChoiceOptions}>
                        <lightning-combobox
                            label="Pass when answer is"
                            variant="label-inline"
                            options={choiceOptions}
                            value={presetChoiceValue}
                            onchange={handlePresetChoiceChange}>
                        </lightning-combobox>
                        <lightning-button label="Apply" variant="neutral" onclick={handlePresetChoiceApply}></lightning-button>
                    </template>
                    <template if:true={isNumericType}>
                        <lightning-input type="number" label="Min" variant="label-inline" value={presetMin} onchange={handlePresetMinChange}></lightning-input>
                        <lightning-input type="number" label="Max" variant="label-inline" value={presetMax} onchange={handlePresetMaxChange}></lightning-input>
                        <lightning-button label="Pass when in range" variant="neutral" onclick={handlePresetRangeApply}></lightning-button>
                    </template>
                    <template if:true={isTextType}>
                        <lightning-input label="Pass when answer contains" variant="label-inline" value={presetText} onchange={handlePresetTextChange}></lightning-input>
                        <lightning-button label="Apply" variant="neutral" onclick={handlePresetTextApply}></lightning-button>
                    </template>
                </div>

                <lightning-input-field field-name="Pass_Criteria__c" value={criteriaDraft}></lightning-input-field>
                <p class="builder-scoring__hint">
                    Generated by the quick rules above — or hand-edit for
                    cross-question criteria: an "all" / "any" wrapper around
                    leaf items with resource / operator / value keys
                    (resource "self" = this question's answer). Remember to
                    Save scoring below.
                </p>

                <h4 class="builder-scoring__subheading">If this question fails</h4>
                <lightning-input-field field-name="Failure_Severity__c"></lightning-input-field>
                <lightning-input-field field-name="Failure_Auto_Finding__c"></lightning-input-field>
                <lightning-input-field field-name="Failure_Photo_Required__c"></lightning-input-field>
                <lightning-input-field field-name="Allow_Exception_Override__c"></lightning-input-field>

                <div class="builder-scoring__actions">
                    <lightning-button
                        type="submit"
                        variant="brand"
                        label="Save scoring">
                    </lightning-button>
                </div>
            </lightning-record-edit-form>
        </template>
    </section>
</template>
