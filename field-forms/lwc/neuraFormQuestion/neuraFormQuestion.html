<template>
	<div lwc:if={isLayoutItem}>
		<lightning-formatted-rich-text
			value={layoutItemRichText}
		></lightning-formatted-rich-text>
	</div>

	<div lwc:else>
		<div
			class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_x-small slds-text-body_regular"
		>
			<div>
				<abbr
					if:true={isRequired}
					class="slds-required"
				>
					*
				</abbr>
				<span
					class="question-label"
					style={labelStyle}
				>
					{question}
				</span>
			</div>
			<!-- Skip-and-return toggle. Lets the tech mark a question to
			     revisit later; the renderer maintains the queue and shows
			     a count in the page chrome. Filled bookmark when active. -->
			<button
				type="button"
				class={skipButtonClass}
				onclick={handleSkipClick}
				title={skipButtonTitle}
				aria-pressed={isSkippedString}
			>
				<lightning-icon
					icon-name={skipIcon}
					size="x-small"
					alternative-text={skipButtonTitle}
				></lightning-icon>
			</button>
		</div>

		<c-neura-form-answer
			lwc:ref="formAnswer"
			record-id={recordId}
			question={formQuestion}
			input-type={questionType}
			is-required={isRequired}
			answer-map={answerMap}
		></c-neura-form-answer>
	</div>
</template>
